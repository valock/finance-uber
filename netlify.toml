[build]
  # Gera config.js a partir das variáveis de ambiente definidas no painel do Netlify
  # Configure em: Site → Site configuration → Environment variables
  #   SUPABASE_URL      = https://seu-projeto.supabase.co
  #   SUPABASE_ANON_KEY = eyJ...sua_chave_anon
  command = "node -e \"require('fs').writeFileSync('config.js', \\\"window.SUPABASE_URL='\\\" + process.env.SUPABASE_URL + \\\"';\\\\nwindow.SUPABASE_ANON_KEY='\\\" + process.env.SUPABASE_ANON_KEY + \\\"';\\\\n\\\");\""
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control         = "public, max-age=0, must-revalidate"
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

# config.js gerado pelo build nunca deve ser cacheado
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"
